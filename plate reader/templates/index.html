<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>License Plate Detector</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #f4f4f9; }
        .container { margin-top: 50px; background: white; display: inline-block; padding: 30px; border-radius: 10px; shadow: 0px 4px 10px rgba(0,0,0,0.1); }
        .result { font-size: 28px; color: #2c3e50; margin: 20px; font-weight: bold; }
        img { border-radius: 8px; max-width: 100%; height: auto; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
    <h1>🚗 License Plate Recognition</h1>
    <p>Upload a car photo to extract the number plate text.</p>
    
    <form action="/predict" method="post" enctype="multipart/form-data">
        <input type="file" name="image" required>
        <br><br>
        <button type="submit" style="padding: 10px 20px; cursor: pointer;">Scan Image</button>
    </form>

    {% if text %}
        <div class="result">Detected: <span style="color: #e74c3c;">{{ text }}</span></div>
        <img src="{{ cropped_img }}" width="500">
    {% endif %}
</div>
</body>
</html>
