<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel AI Bot | Lab 12</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card-bg: rgba(30, 41, 59, 0.7); }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: #f8fafc;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }
        .chat-container {
            width: 100%; max-width: 500px;
            background: var(--card-bg); backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }
        h2 { text-align: center; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .chat-box { height: 300px; overflow-y: auto; margin-bottom: 20px; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .message { margin-bottom: 15px; line-height: 1.5; }
        .user-msg { color: #818cf8; font-weight: 600; }
        .bot-msg { color: #cbd5e1; }
        .input-group { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #334155; background: #1e293b; color: white; }
        button { padding: 10px 20px; border-radius: 10px; border: none; background: var(--primary); color: white; cursor: pointer; font-weight: 600; }
        button:hover { background: #4f46e5; }
    </style>
</head>
<body>
    <div class="chat-container">
        <h2>🏨 AI Hotel Guide</h2>
        <div class="chat-box" id="chatBox">
            <div class="message bot-msg">Welcome! Ask me anything about our hotel in Lahore.</div>
        </div>
        <div class="input-group">
            <input type="text" id="userInput" placeholder="Ask about prices, location, food...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chatBox');
            const message = input.value.trim();
            if (!message) return;

            // Display User Message
            chatBox.innerHTML += `<div class="message user-msg">You: ${message}</div>`;
            input.value = '';

            const response = await fetch('/get', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message })
            });
            const data = await response.json();

            // Display Bot Message
            chatBox.innerHTML += `<div class="message bot-msg">Bot: ${data.reply}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
