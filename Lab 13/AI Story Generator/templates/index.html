<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Storybook Creator | PFAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #818cf8, #c084fc);
            
            /* Standard property (add this) */
            background-clip: text; 
            
            /* Vendor prefixes (keep these) */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            
            /* Fallback for old browsers */
            color: #818cf8; 
        }
        p {
            color: #94a3b8;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        label {
            text-align: left;
            font-weight: 600;
            font-size: 0.9rem;
            color: #cbd5e1;
        }

        input[type="text"] {
            padding: 15px 20px;
            border-radius: 12px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }

        button {
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        footer {
            margin-top: 40px;
            font-size: 0.75rem;
            color: #64748b;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Loading Spinner Animation */
        .loader {
            display: none;
            margin: 20px auto;
            border: 3px solid #334155;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📖 Storybook AI</h1>
        <p>Enter a theme or a prompt below, and let the AI weave a unique tale for you.</p>

        <form action="/generate" method="post" onsubmit="showLoading()">
            <label for="prompt">What's the story about?</label>
            <input type="text" id="prompt" name="prompt" placeholder="e.g, A time traveling car..." required>
            
            <button type="submit" id="submitBtn">Generate Magic</button>
            <div class="loader" id="loader"></div>
        </form>

        <footer>
            BSDSM-4A &bull; PFAI Lab 13
        </footer>
    </div>

    <script>
        function showLoading() {
            document.getElementById('submitBtn').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
        }
    </script>

</body>
</html>
